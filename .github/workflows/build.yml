name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn -B verify -f marrakech-arquitectura/pom.xml

      - name: Code Coverage Report
        uses: madrapps/jacoco-report@v1.6.1
        if: always()
        with:
          paths: marrakech-arquitectura/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage
          min-coverage-overall: 0
          min-coverage-changed-files: 0

      - name: JUnit Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Tests
          path: marrakech-arquitectura/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: marrakech-arquitectura/target/site/jacoco/

      - name: Coverage summary
        if: always()
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          try:
              tree = ET.parse('marrakech-arquitectura/target/site/jacoco/jacoco.xml')
              root = tree.getroot()
              lines = (0, 0)
              branches = (0, 0)
              for c in root.findall('.//counter'):
                  t = c.get('type')
                  cov, mis = int(c.get('covered')), int(c.get('missed'))
                  if t == 'LINE': lines = (cov, mis)
                  elif t == 'BRANCH': branches = (cov, mis)
              lp = lines[0]*100/(lines[0]+lines[1]) if lines[0]+lines[1] else 0
              bp = branches[0]*100/(branches[0]+branches[1]) if branches[0]+branches[1] else 0
              print('## Coverage Summary')
              print('| Type | Covered | Missed | Total | % |')
              print('|------|---------|--------|-------|---|')
              print(f'| Lines | {lines[0]} | {lines[1]} | {lines[0]+lines[1]} | **{lp:.1f}%** |')
              print(f'| Branches | {branches[0]} | {branches[1]} | {branches[0]+branches[1]} | **{bp:.1f}%** |')
          except Exception as e:
              print(f'Coverage report not available: {e}')
          " >> \$GITHUB_STEP_SUMMARY
