name: CI

on:
  push:
    branches: [ develop, main, probando-logica-vieja ]
  pull_request:
    branches: [ develop, main ]
  workflow_dispatch:

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn -B -f marrakech-arquitectura/pom.xml clean verify

      - name: Coverage summary
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('marrakech-arquitectura/target/site/jacoco/jacoco.xml')
          root = tree.getroot()
          print()
          print('┌──────────────────────┬─────────────────┬───────────────┐')
          print('│ Metric               │ Covered / Total │ Percentage    │')
          print('├──────────────────────┼─────────────────┼───────────────┤')
          for m_type, m_name in [('INSTRUCTION','Instructions'),('BRANCH','Branches'),
                                  ('LINE','Lines'),('METHOD','Methods'),('CLASS','Classes')]:
              c = root.find(f'./counter[@type=\"{m_type}\"]')
              if c is not None:
                  m = int(c.get('missed')); v = int(c.get('covered'))
                  t = m + v; p = v / t * 100 if t else 0
                  print(f'│ {m_name:<20} │ {v}/{t:<13} │ {p:>10.2f}% │')
          print('└──────────────────────┴─────────────────┴───────────────┘')
          print()
          "

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: marrakech-arquitectura/target/surefire-reports/

      - name: Upload jacoco report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-xml
          path: marrakech-arquitectura/target/site/jacoco/

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download jacoco report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-xml
          path: marrakech-arquitectura/target/site/jacoco/

      - name: Code Coverage Report
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: marrakech-arquitectura/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage (Servicios)
          min-coverage-overall: 100
          min-coverage-changed-files: 100

  junit:
    name: JUnit Test Report
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: JUnit Test Report
        uses: dorny/test-reporter@v1
        with:
          artifact: surefire-reports
          name: JUnit Tests
          path: '*.xml'
          reporter: java-junit
          fail-on-error: true
