name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and test
        run: mvn -B verify -f marrakech-arquitectura/pom.xml

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: marrakech-arquitectura/target/site/jacoco/

      - name: Publish test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: JUnit Tests
          path: marrakech-arquitectura/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Coverage summary
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('marrakech-arquitectura/target/site/jacoco/jacoco.xml')
          root = tree.getroot()
          for c in root.findall('.//counter'):
              if c.get('type') == 'LINE':
                  cov = int(c.get('covered'))
                  mis = int(c.get('missed'))
                  pct = cov * 100 / (cov + mis)
                  print(f'## Coverage: {pct:.2f}%')
                  print(f'| Lines Covered | Lines Missed | Total |')
                  print(f'|---|---|---|')
                  print(f'| {cov} | {mis} | {cov + mis} |')
          " >> $GITHUB_STEP_SUMMARY
