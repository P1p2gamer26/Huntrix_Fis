name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and test with Maven
        run: mvn -B test jacoco:report -f marrakech-arquitectura/pom.xml

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: marrakech-arquitectura/target/site/jacoco/

      - name: Publish coverage summary
        run: |
          XML=marrakech-arquitectura/target/site/jacoco/jacoco.xml
          C=$(xmllint --xpath 'number(//report/counter[@type="LINE"]/@covered)' "$XML")
          M=$(xmllint --xpath 'number(//report/counter[@type="LINE"]/@missed)' "$XML")
          PCT=$(echo "scale=2; $C * 100 / ($C + $M)" | bc)
          echo "## Coverage: ${PCT}%" >> $GITHUB_STEP_SUMMARY
          echo "| Lines Covered | Lines Missed | Total |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| $(printf "%.0f" $C) | $(printf "%.0f" $M) | $(printf "%.0f" $(echo "$C + $M" | bc)) |" >> $GITHUB_STEP_SUMMARY
