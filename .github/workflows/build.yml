name: CI

on:
  push:
    branches: [ develop, main, probando-logica-vieja ]
  pull_request:
    branches: [ develop, main ]
  workflow_dispatch:

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn -B -f marrakech-arquitectura/pom.xml clean verify

      - name: Coverage summary
        run: |
          python3 << 'EOF'
          import xml.etree.ElementTree as ET, os
          tree = ET.parse('marrakech-arquitectura/target/site/jacoco/jacoco.xml')
          root = tree.getroot()
          md = '### 📊 Code Coverage (Servicios)\n\n'
          md += '| Metric | Covered / Total | Percentage |\n| :--- | :---: | :---: |\n'
          for t,n in [('INSTRUCTION','Instructions'),('BRANCH','Branches'),
                       ('LINE','Lines'),('METHOD','Methods'),('CLASS','Classes')]:
              c = root.find(f'./counter[@type="{t}"]')
              if c is not None:
                  m=int(c.get('missed')); v=int(c.get('covered'))
                  tot=m+v; p=v/tot*100 if tot else 0
                  md += f'| **{n}** | {v}/{tot} | {p:.2f}% |\n'
          sp = os.environ.get('GITHUB_STEP_SUMMARY')
          if sp:
              with open(sp, 'a') as f: f.write(md)
          print(md)
          EOF

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: marrakech-arquitectura/target/surefire-reports/

      - name: Upload jacoco report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-xml
          path: marrakech-arquitectura/target/site/jacoco/

  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: build
    permissions:
      checks: write
      actions: read
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Jacoco Report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-xml
          path: marrakech-arquitectura/target/site/jacoco/

      - name: Generate Code Coverage Summary
        id: coverage_summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: marrakech-arquitectura/target/site/jacoco/jacoco.xml
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both

      - name: Publish Coverage Job Summary
        run: |
          cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

  junit:
    name: JUnit Test Report
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: JUnit Test Report
        uses: dorny/test-reporter@v1
        with:
          artifact: surefire-reports
          name: JUnit Tests
          path: '*.xml'
          reporter: java-junit
          fail-on-error: true
